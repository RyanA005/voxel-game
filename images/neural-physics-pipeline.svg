<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" fill="none">
  <rect width="640" height="420" fill="#1a1a1a"/>
  <rect x="0.5" y="0.5" width="639" height="419" stroke="#2e2e2e"/>

  <text x="320" y="28" fill="#8a8680" font-family="Consolas, monospace" font-size="12" text-anchor="middle">record / train / infer loop</text>

