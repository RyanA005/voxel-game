  <rect x="220" y="208" width="200" height="44" rx="2" fill="#141414" stroke="#2e2e2e"/>
  <text x="320" y="235" fill="#f4a261" font-family="Consolas, monospace" font-size="13" text-anchor="middle">train.py</text>

